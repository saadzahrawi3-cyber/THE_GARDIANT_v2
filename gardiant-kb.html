<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARDIANT — Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f0a;
  --sidebar:  #111409;
  --panel:    #161810;
  --surface:  #1c1f12;
  --border:   rgba(245,158,11,0.12);
  --border2:  rgba(255,255,255,0.05);
  --amber:    #f59e0b;
  --amber-dim:rgba(245,158,11,0.1);
  --amber-glow:rgba(245,158,11,0.35);
  --cyan:     #22d3ee;
  --green:    #86efac;
  --red:      #f87171;
  --text:     #e4e7d8;
  --muted:    #6b7160;
  --mono:     'Fira Code', monospace;
  --sans:     'Bricolage Grotesque', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  font-size: 14px;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo .brand {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
}

.sidebar-logo .brand .eye { color: var(--amber); }

.sidebar-logo .tagline {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 6px;
}

.sidebar-search {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 8px 12px;
  outline: none;
  letter-spacing: 0.5px;
  transition: border-color 0.2s;
}

.sidebar-search input::placeholder { color: var(--muted); }
.sidebar-search input:focus { border-color: rgba(245,158,11,0.4); }

.module-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.module-nav::-webkit-scrollbar { width: 2px; }
.module-nav::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); }

.nav-module {
  padding: 2px 8px;
}

.nav-module-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s;
  position: relative;
  letter-spacing: 0.3px;
}

.nav-module-btn:hover { color: var(--text); background: var(--amber-dim); }

.nav-module-btn.active {
  color: var(--amber);
  background: var(--amber-dim);
}

.nav-module-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--amber);
  box-shadow: 0 0 8px var(--amber);
}

.nav-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--amber);
  background: var(--amber-dim);
  padding: 2px 6px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.nav-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 99px;
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.export-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 9px;
  cursor: pointer;
  transition: all 0.2s;
}

.export-btn:hover {
  border-color: var(--amber);
  color: var(--amber);
}

/* ── MAIN AREA ───────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  padding: 20px 32px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.module-heading {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 4px;
}

.module-goal {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.hints-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding-bottom: 14px;
}

.hint-chip {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 4px 10px;
  letter-spacing: 0.3px;
  line-height: 1.4;
  cursor: default;
  transition: color 0.2s, border-color 0.2s;
}

.hint-chip:hover {
  color: var(--amber);
  border-color: rgba(245,158,11,0.3);
}

.tabs {
  display: flex;
  gap: 0;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 10px 20px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

.tab-count {
  font-family: var(--mono);
  font-size: 0.6rem;
  background: var(--amber-dim);
  color: var(--amber);
  padding: 1px 6px;
  border-radius: 99px;
}

/* ── CONTENT ─────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}

.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.25); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── ADD BUTTON ──────────────────────────────────── */
.add-row {
  margin-bottom: 20px;
  display: flex;
  justify-content: flex-end;
}

.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--amber-dim);
  border: 1px solid rgba(245,158,11,0.3);
  color: var(--amber);
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.add-btn:hover {
  background: rgba(245,158,11,0.2);
  box-shadow: 0 0 20px rgba(245,158,11,0.1);
}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--muted);
}

.empty-icon {
  font-size: 2.5rem;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state p {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 1px;
}

/* ── LESSON CARDS ─────────────────────────────────── */
.lesson-card {
  background: var(--panel);
  border: 1px solid var(--border2);
  padding: 20px 24px;
  margin-bottom: 14px;
  position: relative;
  transition: border-color 0.2s;
}

.lesson-card:hover { border-color: var(--border); }

.lesson-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 16px;
}

.lesson-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.3;
}

.lesson-date {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  flex-shrink: 0;
  margin-top: 2px;
}

.lesson-body {
  font-size: 0.82rem;
  line-height: 1.7;
  color: #b8bfaa;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── LIBRARY CARDS ───────────────────────────────── */
.lib-card {
  background: var(--panel);
  border: 1px solid var(--border2);
  padding: 20px 24px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}

.lib-card:hover { border-color: var(--border); }

.lib-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.lib-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: -0.3px;
}

.lib-lang {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 2px 8px;
  border: 1px solid rgba(34,211,238,0.25);
  color: var(--cyan);
  background: rgba(34,211,238,0.07);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.lib-phase {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 2px 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  letter-spacing: 1px;
  margin-left: auto;
}

.lib-purpose {
  font-size: 0.82rem;
  color: #b8bfaa;
  line-height: 1.5;
  margin-bottom: 14px;
}

.lib-install {
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--green);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: all;
  cursor: copy;
  transition: background 0.2s;
}

.lib-install:hover { background: rgba(134,239,172,0.05); }
.lib-install::before { content: '$ '; color: var(--muted); flex-shrink: 0; }

.lib-functions {
  font-size: 0.78rem;
  color: #b8bfaa;
  line-height: 1.7;
  white-space: pre-wrap;
}

.lib-url a {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--amber);
  text-decoration: none;
  letter-spacing: 0.5px;
  margin-top: 10px;
  display: inline-block;
  opacity: 0.8;
  transition: opacity 0.2s;
}

.lib-url a:hover { opacity: 1; }

/* ── DIAGRAM CARDS ───────────────────────────────── */
.diagram-card {
  background: var(--panel);
  border: 1px solid var(--border2);
  padding: 20px 24px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}

.diagram-card:hover { border-color: var(--border); }

.diagram-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.diagram-content {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--green);
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 16px;
  white-space: pre;
  overflow-x: auto;
  line-height: 1.6;
}

.diagram-content::-webkit-scrollbar { height: 2px; }
.diagram-content::-webkit-scrollbar-thumb { background: rgba(134,239,172,0.3); }

/* ── CARD ACTIONS ────────────────────────────────── */
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  justify-content: flex-end;
}

.act-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.act-btn:hover { border-color: var(--border); color: var(--text); }
.act-btn.del:hover { border-color: rgba(248,113,113,0.4); color: var(--red); }

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  width: min(680px, 95vw);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  animation: modalIn 0.2s ease both;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.modal-title {
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  padding: 4px;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--text); }

.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-body::-webkit-scrollbar { width: 2px; }
.modal-body::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); }

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.82rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}

.field textarea { min-height: 100px; font-family: var(--sans); }
.field textarea.mono { font-family: var(--mono); font-size: 0.72rem; color: var(--green); min-height: 140px; }

.field input:focus, .field textarea:focus, .field select:focus {
  border-color: rgba(245,158,11,0.5);
}

.field select option { background: var(--panel); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

.btn-cancel {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 9px 18px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-cancel:hover { border-color: var(--border); color: var(--text); }

.btn-save {
  background: var(--amber-dim);
  border: 1px solid rgba(245,158,11,0.4);
  color: var(--amber);
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 9px 22px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.btn-save:hover {
  background: rgba(245,158,11,0.25);
  box-shadow: 0 0 20px rgba(245,158,11,0.15);
}

/* ── SEARCH HIGHLIGHT ────────────────────────────── */
.hl { background: rgba(245,158,11,0.25); color: var(--amber); }

/* ── TOAST ───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid rgba(245,158,11,0.3);
  color: var(--amber);
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 1px;
  padding: 10px 18px;
  z-index: 999;
  animation: toastIn 0.3s ease both;
  pointer-events: none;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SCROLLBAR ───────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); }

@media (max-width: 700px) {
  .sidebar { width: 220px; }
  .topbar, .content { padding-left: 20px; padding-right: 20px; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">GARDI<span class="eye">👁</span>NT</div>
    <div class="tagline">// knowledge base</div>
  </div>

  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="search notes..." oninput="handleSearch(this.value)">
  </div>

  <nav class="module-nav" id="moduleNav"></nav>

  <div class="sidebar-footer">
    <button class="export-btn" onclick="exportNotes()">⬇ Export All Notes</button>
  </div>
</aside>

<!-- ── MAIN ────────────────────────────────────────────── -->
<main class="main">
  <div class="topbar">
    <div class="module-heading" id="mainHeading">Select a Module</div>
    <div class="module-goal" id="mainGoal"></div>
    <div class="hints-panel" id="hintsPanel" style="display:none"></div>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" onclick="switchTab('lessons', this)">
        📖 Lessons <span class="tab-count" id="cnt-lessons">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('libraries', this)">
        📦 Libraries <span class="tab-count" id="cnt-libraries">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('diagrams', this)">
        🗺 Diagrams <span class="tab-count" id="cnt-diagrams">0</span>
      </button>
    </div>
  </div>

  <div class="content">
    <!-- LESSONS -->
    <div class="tab-pane active" id="pane-lessons">
      <div class="add-row">
        <button class="add-btn" onclick="openModal('lesson')">+ Add Lesson</button>
      </div>
      <div id="lessons-list"></div>
    </div>

    <!-- LIBRARIES -->
    <div class="tab-pane" id="pane-libraries">
      <div class="add-row">
        <button class="add-btn" onclick="openModal('library')">+ Add Library</button>
      </div>
      <div id="libraries-list"></div>
    </div>

    <!-- DIAGRAMS -->
    <div class="tab-pane" id="pane-diagrams">
      <div class="add-row">
        <button class="add-btn" onclick="openModal('diagram')">+ Add Diagram</button>
      </div>
      <div id="diagrams-list"></div>
    </div>
  </div>
</main>

<!-- ── MODAL ────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Entry</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<script>
/* ── DATA ──────────────────────────────────────────────── */
const MODULES = [
  {
    id: 'm00', tag: 'MOD 00', title: 'The Core Engine',
    goal: 'VSCode + PlatformIO + Arduino IDE + Wokwi + Git/GitHub + Google Colab. Full dev stack ready.',
    hints: ['VSCode + PlatformIO = ESP32 & Arduino C++ firmware', 'Arduino IDE = quick HC-05 Serial Monitor tests', 'Wokwi = simulate circuits before touching real hardware', 'Git = time machine for your code', 'Google Colab = free cloud Python brain for face recognition']
  },
  {
    id: 'm01', tag: 'PH 01', title: 'Robust Core — Arduino + HC-05 + ESP32-CAM',
    goal: 'IR Sensor → Arduino → HC-05 Bluetooth → ESP32-CAM wakes, captures frame. C++ only, no MicroPython.',
    hints: ['IR Sensor → Arduino pin 2 (digitalRead)', 'Arduino sends "MOTION" via HC-05 SoftwareSerial', 'ESP32-CAM receives on Serial2 (GPIO 14)', 'HC-05 = wireless UART — just a wireless cable', 'FreeRTOS splits Bluetooth / Camera / WiFi into tasks', 'Light sleep between triggers = power efficiency']
  },
  {
    id: 'm02', tag: 'PH 02', title: 'Telemetry & Swarm',
    goal: 'ESP32-CAM sends JPEG over WiFi to Google Colab Python server via HTTP POST.',
    hints: ['Always test server with Postman BEFORE connecting ESP32', 'UART / I2C / SPI = the 3 wired protocols', 'Base64 = converts binary image to JSON-safe text', 'HTTP POST = how the ESP32 sends the image', 'MQTT = lightweight IoT pub/sub protocol (know the concept)']
  },
  {
    id: 'm03', tag: 'PH 03', title: 'Precision Mechanics',
    goal: 'Pan/tilt servo mount tracks faces. PID removes jitter. Inverse kinematics maps pixels to angles.',
    hints: ['Fusion 360 = design the camera bracket in 3D', 'PWM duty cycle = servo angle (1ms=0°, 1.5ms=90°, 2ms=180°)', 'PID = P×error + I×accumulated + D×rate of change', 'Inverse kinematics = pixel_error → servo_angle math']
  },
  {
    id: 'm04', tag: 'PH 04', title: 'The Intelligent Eye',
    goal: 'OpenCV decodes frame. face_recognition encodes faces into 128-vectors. Returns KNOWN name or STRANGER.',
    hints: ['QVGA = best resolution for speed vs accuracy balance', 'face_encodings = 128-number unique fingerprint per face', 'compare_faces(known, unknown, tolerance=0.6) = True/False', 'face_distance = find the closest matching known person', 'Known faces .pkl file persists on Google Drive']
  },
  {
    id: 'm05', tag: 'PH 05', title: 'Autonomous Capstone',
    goal: 'Twilio sends WhatsApp alerts. Claude API agent decides action. Node-RED shows live dashboard.',
    hints: ['Twilio WhatsApp Sandbox = free test environment', 'Claude API + tool use = true agentic decision making', 'Tools: send_whatsapp(name, photo) / trigger_alert(photo)', 'MQTT topics: gardiant/events, gardiant/frame, gardiant/alert', 'Node-RED dashboard at localhost:1880/ui']
  },
  {
    id: 'm06', tag: 'PH 06', title: 'Industrial Scaling',
    goal: 'Docker containers. Raspberry Pi as 24/7 local brain. Coral TPU for 30fps. PoC → production path.',
    hints: ['Docker = package + run Gardiant server anywhere', 'Raspberry Pi = always-on, no Colab disconnect problem', 'Coral USB TPU = 10× faster inference (2fps → 30fps)', 'OTA = update ESP32 over WiFi without unplugging', 'systemd = auto-restart Gardiant on Raspberry Pi boot']
  },
];

function loadDB() {
  try { return JSON.parse(localStorage.getItem('gardiant_kb') || '{}'); }
  catch { return {}; }
}

function saveDB(db) {
  localStorage.setItem('gardiant_kb', JSON.stringify(db));
}

function getModuleData(moduleId) {
  const db = loadDB();
  if (!db[moduleId]) db[moduleId] = { lessons: [], libraries: [], diagrams: [] };
  return db[moduleId];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function today() {
  return new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

/* ── STATE ─────────────────────────────────────────────── */
let activeModule = MODULES[0].id;
let activeTab    = 'lessons';
let modalType    = null;
let editId       = null;
let searchQuery  = '';

/* ── SIDEBAR RENDER ────────────────────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = '';
  MODULES.forEach(m => {
    const db = loadDB();
    const data = db[m.id] || { lessons:[], libraries:[], diagrams:[] };
    const count = (data.lessons?.length||0) + (data.libraries?.length||0) + (data.diagrams?.length||0);
    const btn = document.createElement('div');
    btn.className = 'nav-module';
    btn.innerHTML = `
      <button class="nav-module-btn ${m.id===activeModule?'active':''}" onclick="selectModule('${m.id}')">
        <span class="nav-tag">${m.tag}</span>
        ${m.title}
        ${count > 0 ? `<span class="nav-count">${count}</span>` : ''}
      </button>`;
    nav.appendChild(btn);
  });
}

/* ── MODULE SELECTION ──────────────────────────────────── */
function selectModule(id) {
  activeModule = id;
  const m = MODULES.find(x => x.id === id);
  document.getElementById('mainHeading').textContent = `${m.tag} — ${m.title}`;
  document.getElementById('mainGoal').textContent = '// ' + m.goal;

  // Render hints panel
  const hintsEl = document.getElementById('hintsPanel');
  if (m.hints && m.hints.length) {
    hintsEl.innerHTML = m.hints.map(h => `<span class="hint-chip">— ${h}</span>`).join('');
    hintsEl.style.display = 'flex';
  } else {
    hintsEl.style.display = 'none';
  }

  renderSidebar();
  renderAll();
}

/* ── TABS ──────────────────────────────────────────────── */
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  btn.classList.add('active');
}

/* ── RENDER ALL ────────────────────────────────────────── */
function renderAll() {
  renderLessons();
  renderLibraries();
  renderDiagrams();
}

function highlight(text) {
  if (!searchQuery) return escHtml(text);
  const re = new RegExp('(' + searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<span class="hl">$1</span>');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterCard(card) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return JSON.stringify(card).toLowerCase().includes(q);
}

/* ── LESSONS ───────────────────────────────────────────── */
function renderLessons() {
  const data = getModuleData(activeModule);
  const list = document.getElementById('lessons-list');
  const filtered = data.lessons.filter(filterCard);
  document.getElementById('cnt-lessons').textContent = data.lessons.length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📖</div>
      <p>${searchQuery ? 'No results found.' : 'No lessons yet — add your first one.'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(l => `
    <div class="lesson-card">
      <div class="lesson-card-header">
        <div class="lesson-title">${highlight(l.title)}</div>
        <div class="lesson-date">${l.date||''}</div>
      </div>
      <div class="lesson-body">${highlight(l.content)}</div>
      <div class="card-actions">
        <button class="act-btn" onclick="openModal('lesson','${l.id}')">Edit</button>
        <button class="act-btn del" onclick="deleteEntry('lesson','${l.id}')">Delete</button>
      </div>
    </div>`).join('');
}

/* ── LIBRARIES ─────────────────────────────────────────── */
function renderLibraries() {
  const data = getModuleData(activeModule);
  const list = document.getElementById('libraries-list');
  const filtered = data.libraries.filter(filterCard);
  document.getElementById('cnt-libraries').textContent = data.libraries.length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📦</div>
      <p>${searchQuery ? 'No results found.' : 'No libraries yet — add one.'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(l => `
    <div class="lib-card">
      <div class="lib-header">
        <div class="lib-name">${highlight(l.name)}</div>
        ${l.lang ? `<span class="lib-lang">${escHtml(l.lang)}</span>` : ''}
        <span class="lib-phase">${activeModule.toUpperCase()}</span>
      </div>
      <div class="lib-purpose">${highlight(l.purpose)}</div>
      ${l.install ? `<div class="lib-install" title="click to copy" onclick="copyText('${escHtml(l.install)}')">${highlight(l.install)}</div>` : ''}
      ${l.functions ? `<div class="lib-functions">${highlight(l.functions)}</div>` : ''}
      ${l.url ? `<div class="lib-url"><a href="${escHtml(l.url)}" target="_blank">↗ ${escHtml(l.url)}</a></div>` : ''}
      <div class="card-actions">
        <button class="act-btn" onclick="openModal('library','${l.id}')">Edit</button>
        <button class="act-btn del" onclick="deleteEntry('library','${l.id}')">Delete</button>
      </div>
    </div>`).join('');
}

/* ── DIAGRAMS ──────────────────────────────────────────── */
function renderDiagrams() {
  const data = getModuleData(activeModule);
  const list = document.getElementById('diagrams-list');
  const filtered = data.diagrams.filter(filterCard);
  document.getElementById('cnt-diagrams').textContent = data.diagrams.length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🗺</div>
      <p>${searchQuery ? 'No results found.' : 'No diagrams yet — sketch one in ASCII.'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="diagram-card">
      <div class="diagram-title">${highlight(d.title)}</div>
      <pre class="diagram-content">${highlight(d.content)}</pre>
      <div class="card-actions">
        <button class="act-btn" onclick="openModal('diagram','${d.id}')">Edit</button>
        <button class="act-btn del" onclick="deleteEntry('diagram','${d.id}')">Delete</button>
      </div>
    </div>`).join('');
}

/* ── MODAL ─────────────────────────────────────────────── */
function openModal(type, id = null) {
  modalType = type;
  editId    = id;
  const overlay = document.getElementById('modalOverlay');
  const body    = document.getElementById('modalBody');
  const title   = document.getElementById('modalTitle');

  let entry = null;
  if (id) {
    const data = getModuleData(activeModule);
    const arr = type === 'lesson' ? data.lessons : type === 'library' ? data.libraries : data.diagrams;
    entry = arr.find(x => x.id === id);
  }

  if (type === 'lesson') {
    title.textContent = id ? 'Edit Lesson' : 'Add Lesson';
    body.innerHTML = `
      <div class="field">
        <label>Title</label>
        <input type="text" id="f-title" placeholder="e.g. What is FreeRTOS and why it matters" value="${escHtml(entry?.title||'')}">
      </div>
      <div class="field">
        <label>Content — what you learned (use plain text, examples, analogies)</label>
        <textarea id="f-content" placeholder="Explain in your own words...">${escHtml(entry?.content||'')}</textarea>
      </div>`;

  } else if (type === 'library') {
    title.textContent = id ? 'Edit Library' : 'Add Library';
    body.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>Library Name</label>
          <input type="text" id="f-name" placeholder="e.g. face_recognition" value="${escHtml(entry?.name||'')}">
        </div>
        <div class="field">
          <label>Language / Platform</label>
          <input type="text" id="f-lang" placeholder="e.g. Python, C++, JS" value="${escHtml(entry?.lang||'')}">
        </div>
      </div>
      <div class="field">
        <label>What it does (purpose)</label>
        <input type="text" id="f-purpose" placeholder="e.g. Detects and compares faces in images" value="${escHtml(entry?.purpose||'')}">
      </div>
      <div class="field">
        <label>Install command</label>
        <input type="text" id="f-install" placeholder="e.g. pip install face_recognition" value="${escHtml(entry?.install||'')}">
      </div>
      <div class="field">
        <label>Key functions / usage notes</label>
        <textarea id="f-functions" placeholder="face_recognition.load_image_file(path)&#10;face_recognition.face_encodings(img)&#10;face_recognition.compare_faces(known, unknown)">${escHtml(entry?.functions||'')}</textarea>
      </div>
      <div class="field">
        <label>Docs URL (optional)</label>
        <input type="text" id="f-url" placeholder="https://..." value="${escHtml(entry?.url||'')}">
      </div>`;

  } else if (type === 'diagram') {
    title.textContent = id ? 'Edit Diagram' : 'Add Diagram';
    body.innerHTML = `
      <div class="field">
        <label>Diagram Title</label>
        <input type="text" id="f-title" placeholder="e.g. Gardiant Full Pipeline" value="${escHtml(entry?.title||'')}">
      </div>
      <div class="field">
        <label>ASCII / Text Diagram — use spaces to align</label>
        <textarea class="mono" id="f-content" rows="12" placeholder="ESP32-CAM
    │
    │ WiFi POST (base64 image)
    ▼
Python Server (Colab)
    ├── face_recognition.compare_faces()
    └── Claude API (agent decision)
            │
            ├── Known  → WhatsApp: 'SAAD entered'
            └── Unknown → WhatsApp alert + Twilio call">${escHtml(entry?.content||'')}</textarea>
      </div>`;
  }

  overlay.classList.add('open');
  setTimeout(() => { const f = body.querySelector('input,textarea'); if(f) f.focus(); }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalType = null;
  editId    = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveEntry() {
  const db   = loadDB();
  if (!db[activeModule]) db[activeModule] = { lessons:[], libraries:[], diagrams:[] };
  const data = db[activeModule];

  if (modalType === 'lesson') {
    const title   = document.getElementById('f-title')?.value?.trim();
    const content = document.getElementById('f-content')?.value?.trim();
    if (!title) { alert('Title is required.'); return; }
    if (editId) {
      const l = data.lessons.find(x => x.id === editId);
      if (l) { l.title = title; l.content = content; }
    } else {
      data.lessons.push({ id: uid(), title, content, date: today() });
    }

  } else if (modalType === 'library') {
    const name      = document.getElementById('f-name')?.value?.trim();
    const lang      = document.getElementById('f-lang')?.value?.trim();
    const purpose   = document.getElementById('f-purpose')?.value?.trim();
    const install   = document.getElementById('f-install')?.value?.trim();
    const functions = document.getElementById('f-functions')?.value?.trim();
    const url       = document.getElementById('f-url')?.value?.trim();
    if (!name) { alert('Name is required.'); return; }
    if (editId) {
      const l = data.libraries.find(x => x.id === editId);
      if (l) Object.assign(l, { name, lang, purpose, install, functions, url });
    } else {
      data.libraries.push({ id: uid(), name, lang, purpose, install, functions, url });
    }

  } else if (modalType === 'diagram') {
    const title   = document.getElementById('f-title')?.value?.trim();
    const content = document.getElementById('f-content')?.value?.trim();
    if (!title) { alert('Title is required.'); return; }
    if (editId) {
      const d = data.diagrams.find(x => x.id === editId);
      if (d) { d.title = title; d.content = content; }
    } else {
      data.diagrams.push({ id: uid(), title, content, date: today() });
    }
  }

  saveDB(db);
  closeModal();
  renderSidebar();
  renderAll();
  showToast('Saved ✓');
}

function deleteEntry(type, id) {
  if (!confirm('Delete this entry?')) return;
  const db = loadDB();
  const data = db[activeModule];
  const arr = type === 'lesson' ? data.lessons : type === 'library' ? data.libraries : data.diagrams;
  const idx = arr.findIndex(x => x.id === id);
  if (idx !== -1) arr.splice(idx, 1);
  saveDB(db);
  renderSidebar();
  renderAll();
  showToast('Deleted.');
}

/* ── SEARCH ────────────────────────────────────────────── */
function handleSearch(q) {
  searchQuery = q.trim().toLowerCase();
  renderAll();
}

/* ── COPY TO CLIPBOARD ─────────────────────────────────── */
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

/* ── EXPORT ────────────────────────────────────────────── */
function exportNotes() {
  const db = loadDB();
  let out = '# GARDIANT — Knowledge Base Export\n';
  out += `Exported: ${new Date().toLocaleString()}\n\n`;
  MODULES.forEach(m => {
    const data = db[m.id];
    if (!data) return;
    const total = (data.lessons?.length||0)+(data.libraries?.length||0)+(data.diagrams?.length||0);
    if (!total) return;
    out += `\n${'='.repeat(60)}\n${m.tag} — ${m.title}\n${'='.repeat(60)}\n`;
    if (data.lessons?.length) {
      out += '\n## LESSONS\n';
      data.lessons.forEach(l => { out += `\n### ${l.title}\n${l.date||''}\n${l.content}\n`; });
    }
    if (data.libraries?.length) {
      out += '\n## LIBRARIES\n';
      data.libraries.forEach(l => { out += `\n### ${l.name} (${l.lang||''})\n${l.purpose||''}\nInstall: ${l.install||''}\n${l.functions||''}\n${l.url||''}\n`; });
    }
    if (data.diagrams?.length) {
      out += '\n## DIAGRAMS\n';
      data.diagrams.forEach(d => { out += `\n### ${d.title}\n\`\`\`\n${d.content}\n\`\`\`\n`; });
    }
  });

  const blob = new Blob([out], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gardiant-notes.md';
  a.click();
  showToast('Exported!');
}

/* ── TOAST ─────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

/* ── KEYBOARD ──────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ── INIT ──────────────────────────────────────────────── */
selectModule(MODULES[0].id);
</script>
